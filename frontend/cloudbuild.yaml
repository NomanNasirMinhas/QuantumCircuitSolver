steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_API_BASE_URL}
      - --build-arg
      - NEXT_PUBLIC_WS_URL=${_WS_URL}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: quantum-circuit-frontend
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/quantum-circuit-solver/frontend:latest
  _API_BASE_URL: https://your-backend-cloud-run-url
  _WS_URL: wss://your-backend-cloud-run-url/ws/simulate

images:
  - ${_IMAGE}

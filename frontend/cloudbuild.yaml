steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=${_API_BASE_URL}
      - --build-arg
      - NEXT_PUBLIC_WS_URL=${_WS_URL}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --max-instances
      - ${_MAX_INSTANCES}
      - --memory
      - ${_MEMORY}
      - --cpu
      - ${_CPU}
      - --timeout
      - ${_TIMEOUT}

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: agentiq-frontend
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/agentiq/frontend:latest
  _API_BASE_URL: https://your-backend-cloud-run-url
  _WS_URL: wss://your-backend-cloud-run-url/ws/simulate
  _MAX_INSTANCES: "2"
  _MEMORY: 1Gi
  _CPU: "1"
  _TIMEOUT: "900"

images:
  - ${_IMAGE}

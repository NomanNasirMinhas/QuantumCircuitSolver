steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -ceu
      - |
        reset_endpoint='${_ACCESS_CODE_RESET_ENDPOINT}'
        list_endpoint='${_ACCESS_CODE_LIST_ENDPOINT}'

        if [[ -z "${reset_endpoint// }" ]]; then
          echo "_ACCESS_CODE_RESET_ENDPOINT is required (example: /admin/access/reset)."
          exit 1
        fi
        if [[ -z "${list_endpoint// }" ]]; then
          echo "_ACCESS_CODE_LIST_ENDPOINT is required (example: /admin/access/list)."
          exit 1
        fi
        if [[ "${reset_endpoint}" != /* ]]; then
          echo "_ACCESS_CODE_RESET_ENDPOINT must start with '/'. Current value: ${reset_endpoint}"
          exit 1
        fi
        if [[ "${list_endpoint}" != /* ]]; then
          echo "_ACCESS_CODE_LIST_ENDPOINT must start with '/'. Current value: ${list_endpoint}"
          exit 1
        fi

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_IMAGE}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image
      - ${_IMAGE}
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --timeout
      - ${_TIMEOUT}
      - --max-instances
      - ${_MAX_INSTANCES}
      - --memory
      - ${_MEMORY}
      - --cpu
      - ${_CPU}
      - --set-env-vars
      - GCP_PROJECT_ID=$PROJECT_ID
      - --set-env-vars
      - GOOGLE_CLOUD_PROJECT=$PROJECT_ID
      - --set-env-vars
      - GOOGLE_CLOUD_LOCATION=${_GCP_LOCATION}
      - --set-env-vars
      - CORS_ALLOW_ORIGINS=${_CORS_ORIGINS}
      - --set-env-vars
      - MAX_PROMPT_LENGTH=${_MAX_PROMPT_LENGTH}
      - --set-env-vars
      - MAX_ACTIVE_WORKFLOWS_PER_IP=${_MAX_ACTIVE_WORKFLOWS_PER_IP}
      - --set-env-vars
      - DEBUG_RUNS_DIR=${_DEBUG_RUNS_DIR}
      - --set-env-vars
      - ACCESS_CODE_MASTER_PASSWORD=${_ACCESS_CODE_MASTER_PASSWORD}
      - --set-env-vars
      - ACCESS_CODE_RESET_ENDPOINT=${_ACCESS_CODE_RESET_ENDPOINT}
      - --set-env-vars
      - ACCESS_CODE_LIST_ENDPOINT=${_ACCESS_CODE_LIST_ENDPOINT}
      - --set-env-vars
      - ACCESS_CODE_STATE_FILE=${_ACCESS_CODE_STATE_FILE}
      - --set-env-vars
      - ACCESS_CODE_BOOTSTRAP_COUNT=${_ACCESS_CODE_BOOTSTRAP_COUNT}
      - --set-env-vars
      - RUN_HISTORY_GCS_BUCKET=${_RUN_HISTORY_GCS_BUCKET}
      - --set-env-vars
      - RUN_HISTORY_GCS_PREFIX=${_RUN_HISTORY_GCS_PREFIX}

substitutions:
  _REGION: us-central1
  _SERVICE_NAME: agentiq-orchestrator
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/agentiq/backend:latest
  _CORS_ORIGINS: https://your-frontend-domain.example
  _GCP_LOCATION: global
  _MAX_PROMPT_LENGTH: "2000"
  _MAX_ACTIVE_WORKFLOWS_PER_IP: "1"
  _DEBUG_RUNS_DIR: /tmp/debug_runs
  _ACCESS_CODE_MASTER_PASSWORD: ""
  _ACCESS_CODE_RESET_ENDPOINT: ""
  _ACCESS_CODE_LIST_ENDPOINT: ""
  _ACCESS_CODE_STATE_FILE: /tmp/access_codes_state.json
  _ACCESS_CODE_BOOTSTRAP_COUNT: "5"
  _RUN_HISTORY_GCS_BUCKET: __DISABLED__
  _RUN_HISTORY_GCS_PREFIX: successful_runs
  _TIMEOUT: "3600"
  _MAX_INSTANCES: "1"
  _MEMORY: 4Gi
  _CPU: "2"

images:
  - ${_IMAGE}
